      mod_form.php) y los indicadores de analítica (solo útiles con modelos activos).
  DEC-0054:
    titulo: "Extracción de la lógica de lib.php a clases por responsabilidad (grades/*, local/scorm/*, package_manager, urls)"
    estado: Aceptada
    ruta: decisiones/adr/DEC-0054-extraccion-lib-php.md
    fecha: 2026-06-12
    relacionados: [DEC-0049, DEC-0046, DEC-0038, DEC-0007, DEC-0016]
    notas: >-
      Selecciona el hallazgo "descomposición de lib.php" diferido en DEC-0049. Refactor
      mecánico sin cambio de comportamiento: lib.php 1751 → 956 líneas; los cuerpos de
      sync/recálculo/item-management/completion (grades\grade_sync, grade_recalculator,
      grade_item_manager, completion_validator), de paquete (local\package_manager), de
      transformación SCORM al servir (local\scorm\scorm_injector, idevice_patch) y de
