  DEC-0035:
    titulo: "Coherencia profesor/alumno en peritem: excluir la nota overall oculta de la agregación"
    estado: Superseded
    supersede_by: DEC-0038
    ruta: decisiones/adr/DEC-0035-visibilidad-notas-alumno-peritem.md
    fecha: 2026-06-04
    relacionados: [DEC-0008, DEC-0010, DEC-0017, DEC-0018, FTE-012]
    notas: >-
      Petición usabilidad INTEF #2: profesor y alumno veían items distintos y al alumno
      "no le aparecían" las notas. Causa: el overall oculto (peritem, para
      completionpassgrade/DEC-0010) seguía agregando y Moodle vaciaba el total del alumno
      (grade_report_user_showtotalsifcontainhidden default 0). Fix (opción A): excluir la
      nota overall de la agregación con grade_grade::set_excluded (exelearning_exclude_overall_grade
      desde track.php y recalculate_user_grades) + migración en upgrade. get_hiding_affected
      salta las excluidas → el total deja de vaciarse; finalgrade/gradepass intactos.
      Verificado en Docker: COURSE TOTAL blanked_by_hidden=NO.
  DEC-0039:
    titulo: "Parser de content.xml híbrido (DOM para estructura + descifrado/hash conservados)"
    estado: Aceptada
    ruta: decisiones/adr/DEC-0039-parser-content-xml-hibrido-dom.md
    fecha: 2026-06-09
    relacionados: [DEC-0022, DEC-0037, REPO-004, REPO-005]
    notas: >-
      El parser regex (package.php) se refactoriza a híbrido: DOMDocument recorre la
      estructura por local-name() (robusto a namespaces/entidades/CDATA/orden de atributos)
      y se reutilizan sin cambios el descifrado DataGame/isScorm y el contenthash sobre las
      cadenas decodificadas; fallback al escáner regex con log si el XML está malformado. La
      premisa "evitar libxml en backports" era falsa (dom/xml/xmlreader son required en
      4.5-5.2, admin/environment.xml). Los fixtures reales cazaron un bug crítico: los .elpx
      declaran <!DOCTYPE ode SYSTEM "content.dtd"> → se acepta el DTD externo (LIBXML_NONET
      sin DTDLOAD/NOENT) y solo se rechazan entidades internas (billion-laughs). El
      contenthash se recalcula una vez (aviso DEC-0021 informativo). 22 tests verde.
  DEC-0040:
    titulo: "API externa / móvil (servicios MOODLE_OFFICIAL_MOBILE_SERVICE + save_track)"
    estado: Aceptada
    ruta: decisiones/adr/DEC-0040-mobile-external-api.md
    fecha: 2026-06-09
    relacionados: [DEC-0017, DEC-0018, REPO-001, REPO-002, REPO-004]
    notas: >-
      mod_exelearning no exponía servicios móviles (solo 2 funciones admin del editor). Se
      añaden 6 funciones en MOODLE_OFFICIAL_MOBILE_SERVICE (get_exelearnings_by_courses,
