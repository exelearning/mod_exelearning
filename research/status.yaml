riesgos:
  RIE-001:
    titulo: "XSS cross-component desde paquete eXeLearning malicioso"
    severidad: media
    probabilidad: baja
    estado: mitigado
    mitigacion: >-
      MITIGADO (2026-06-13, DEC-0059 + DEC-0060): el modo seguro por defecto (iframemode=secure)
      sirve el paquete en un iframe de ORIGEN OPACO (sin allow-same-origin) por tokenpluginfile
      (DEC-0060 corrige la Ruta A: el opaco no envía la cookie SameSite, así que los assets se
      sirven por token en la URL, no por cookie) y releva el scoring SCORM por un canal postMessage
      validado (identidad de ventana + nonce + acción cerrada), con el sesskey sólo en el padre; el
      contenido ya no puede leer DOM/cookies/sesión ni forjar peticiones (solo recibe un token de
      lectura de ficheros, acotado por CSP+TTL). Sin degradación silenciosa a legacy: watchdog que
      avisa si secure no puede renderizar. Verificado en navegador (track.php guarda la nota).
      legacy queda como respaldo opt-in (vuelve al riesgo same-origin). Contexto previo (DEC-0019,
      sin implementar entonces):
      v1 VIGENTE: sandbox del iframe sin allow-top-navigation / allow-modals (AN-008).
      Investigación TAREA-012 completada en DEC-0019 (2026-06-02): core NO aísla (mod_scorm
      sin sandbox; core_h5p curado), mod_exelearning ya es el mejor aislado de los tres, y
      no hay origen separado en core (requiere infra). Roadmap documentado de hardening
      (NO implementado por decisión): Tier 1 = M2 Permissions-Policy (limpio) + M3 CSP de red
      estricto-por-defecto-con-toggle-admin + M1 quitar allow-popups-to-escape-sandbox (rompe
      print de la rúbrica); Tier 2 = M6 reescribir el bridge a postMessage → M7 origen opaco
      o subdominio (eTLD+1 separado). El bridge same-origin es estructural, así que M7 depende
      de M6. v2 (subdominio) sigue requiriendo infra fuera de core.
    relacionados:
      - AN-008
      - DEC-0003
      - DEC-0004
      - DEC-0019
      - DEC-0059
      - DEC-0060
      - TAREA-012
      - TAREA-017
  RIE-007:
    titulo: "suspend_data N (índice local de página) tratado como itemnumber → mis-ruteo y colisión de notas"
    severidad: alta
    probabilidad: alta
    estado: resuelto
    mitigacion: >-
      RESUELTO en DEC-0017: el shim de view.php captura el objectid estable del
      iDevice leyendo el contentDocument del iframe en el momento del scoring y
      track.php rutea por objectid → itemnumber (clase \mod_exelearning\local\track),
      con fallback legacy por N para single-page. Cero cambios en código vendorado.
      Residuo del overall multipágina (cmi.core.score.raw corrupto) CERRADO en
      DEC-0018: el overall (itemnumber=0) se recomputa desde itemscores por objectid.
    relacionados:
      - DEC-0016
      - DEC-0017
      - DEC-0018
      - DEC-0008
  RIE-008:
    titulo: "Sin verificación de integridad (checksum/firma) del ZIP del editor descargado"
    severidad: media
    probabilidad: baja
    estado: mitigado
    mitigacion: >-
      Mitigado en TAREA-010: el instalador consulta GitHub Releases API, extrae
      el campo asset.digest sha256 del ZIP estático y verifica hash_file('sha256')
      antes de extraer. TLS estricto + blocklist SSRF (DEC-0016) permanecen.
    relacionados:
      - DEC-0016
      - TAREA-010
  RIE-010:
    titulo: "Puente legacy postMessage sin guard de origen (handleLegacyBridgeMessage)"
    severidad: media
    probabilidad: baja
    estado: mitigado
    mitigacion: >-
      Mitigado en TAREA-008: `handleLegacyBridgeMessage()` comparte el guard de
      `event.source`/`event.origin` con el bridge moderno; `amd/build` fue
      regenerado con `grunt amd`.
    relacionados:
      - DEC-0016
      - DEC-0018
  RIE-011:
    titulo: "TOCTOU en el límite de intentos (maxattempt)"
    severidad: baja
    probabilidad: baja
    estado: aceptado
    mitigacion: >-
      Entre el conteo de intentos y el primer record_item de una sesión nueva, dos
      page-loads concurrentes podrían exceder maxattempt por un intento. ACEPTADO por
      paridad con core (TAREA-009 / DEC-0018, revisión 2026-06-01): ni mod_scorm
      (scorm_attempt sin UNIQUE, maxattempt solo en UI) ni mod_h5pactivity (count+1 con
      solo UNIQUE, sin maxattempt) protegen este caso; mod_exelearning ya tiene el
      UNIQUE (exelearningid,userid,attempt,itemnumber) y validación de maxattempt. El
      UNIQUE no cubre exceder con números de intento distintos en dos sesiones nuevas
      concurrentes; el cierre robusto sería un lock \core\lock confinado a !sessionknown,
      dejado como mitigación futura opcional. Riesgo baja/baja.
    relacionados:
      - DEC-0007
      - DEC-0018
      - TAREA-009
  RIE-012:
    titulo: "Nota obsoleta al editar las opciones de una tarea calificable de un .elpx ya intentado"
    severidad: media
    probabilidad: media
    estado: mitigado
    mitigacion: >-
      Editar las opciones/respuesta/puntuación de un iDevice conserva su objectid (y por
      tanto su itemnumber y los intentos enlazados), pero el scaledscore guardado es del
      contenido viejo y no se recalcula. mod_exelearning puntúa en el cliente (eXeLearning)
      y el servidor solo persiste el scaledscore, así que el recálculo estilo quiz es
      inviable (FTE-010). MITIGADO en DEC-0021 con semántica snapshot (= core) + aviso al
      profesor estilo SCORM: contenthash por iDevice en exelearning_grade_item detecta la
      edición; exelearning_sync_grade_items devuelve delta added/removed/changed;
      exelearning_warn_if_grades_stale encola \core\notification::warning cuando hay cambio
      E intentos, enlazando al informe de intentos (reset manual = remediación). Residuo:
      posibles falsos positivos del hash (aviso informativo, no bloquea). Seguimiento:
      TAREA-014.
    relacionados:
      - DEC-0021
      - DEC-0012
      - FTE-010
      - TAREA-014
  RIE-013:
    titulo: "Duplicación de la lógica de extracción/sandbox .elpx entre mod_exelearning y contenttype_exelearning"
    severidad: baja
    probabilidad: media
    estado: aceptado
    mitigacion: >-
      mod_exelearning (actividad) y contenttype_exelearning (banco de contenidos, REPO-006) son
      plugins separados por necesidad arquitectónica (DEC-0036, FTE-013) y replican la misma
      extracción de ZIP .elpx y la misma política sandbox del iframe sin compartir código
      (mirroring intencional). Riesgo de deriva si una corrige un fallo de seguridad/render y la
      otra no. ACEPTADO: duplicación menor y acotada; mitigación futura OPCIONAL = extraer una
      librería .elpx común (parser/extracción/sandbox) consumida por ambos plugins (seguimiento
      D3a de DEC-0036). No se aborda ahora por no acoplar ciclos de release (STABLE vs ALPHA).
    relacionados:
      - DEC-0036
      - REPO-006
      - FTE-013
  RIE-017:
    titulo: "Indexado de contenido no visible o fuga de información vía búsqueda global"
    severidad: baja
    probabilidad: baja
    estado: mitigado
    mitigacion: >-
      El área de búsqueda (DEC-0053, classes/search/activity.php) indexa los filearea
      intro/content. Si indexara contenido que un usuario no debería ver, el buscador podría
      filtrar fragmentos. MITIGADO: no se sobrescribe check_access(); la base
      core_search\base_activity reverifica uservisible por módulo antes de devolver
      resultados, y los filearea intro/content ya se sirven bajo
      require_capability('mod/exelearning:view') en exelearning_pluginfile. Cubierto por
      tests/search_test.php (check_access admin/alumno × visible/oculto/borrado).
    relacionados:
      - DEC-0053
      - DEC-0049
  RIE-016:
    titulo: "attempt_completed podría dispararse en el primer commit puntuado sin lesson_status explícito"
    severidad: baja
    probabilidad: media
    estado: aceptado
    mitigacion: >-
      Un commit con nota pero sin cmi.core.lesson_status normaliza a 'completed' (DEC-0007),
      así que attempt_completed se emitiría en ese primer commit. ACEPTADO: sigue siendo una
      vez por intento (el siguiente commit ve el estado previo ya terminal y no re-emite), sin
      flood; el flujo incompleto→completo real se cubre por la transición de estado.
    relacionados:
      - DEC-0051
      - DEC-0041
      - DEC-0007
  RIE-014:
    titulo: "Cambio del estado requerido de completion con intentos ya registrados"
    severidad: baja
    probabilidad: baja
    estado: mitigado
    mitigacion: >-
      Cambiar el estado exigido por la regla completionstatusrequired (DEC-0052) tras haber
      intentos podría recalcular la finalización para el alumnado ya evaluado. MITIGADO:
      mod_form data_postprocessing solo persiste el valor con completion automática activa;
      track::ingest recalcula la finalización en cada commit (queda coherente con los
      intentos reales); el campo es nullable y por defecto NULL (regla desactivada),
      preservando el comportamiento previo. Cubierto por tests/completion_test.php.
    relacionados:
      - DEC-0052
      - DEC-0044
  RIE-015:
    titulo: "Deriva futura del contrato activity_custom_completion respecto a mod_scorm"
    severidad: baja
    probabilidad: baja
    estado: mitigado
    mitigacion: >-
      Si Moodle cambia el contrato de core_completion activity_custom_completion, la subclase
      de mod_exelearning (DEC-0052) podría divergir. MITIGADO: la implementación es un calco
      fino del patrón canónico de mod_scorm (REPO-004), cubierta por PHPUnit
      (tests/completion_test.php, tests/backup_restore_test.php) y el gate de cobertura
      Codecov (DEC-0048).
    relacionados:
      - DEC-0052
      - DEC-0048
  RIE-019:
    titulo: "El guard central de extracción servible (DEC-0055 #3) ahora lanza en todas las vías, no solo migración"
    severidad: baja
    probabilidad: baja
    estado: resuelto
    mitigacion: >-
      package_manager::extract_stored() lanza migrateextractfailed si tras extraer no hay index.html.
      Antes solo migración lo comprobaba; ahora también el self-heal de view.php y editor/save.php.
      MITIGADO: es el fallo-ruidoso buscado ante paquete corrupto; todos los fixtures (.elpx reales +
      zip inline de lib_test) contienen index.html, así que ningún paquete válido lo dispara. Cubierto
      por tests/local/package_manager_extract_test.php.
    resolucion: >-
      RESUELTO por DEC-0057 (issue 73, 2026-06-13): el fallo ruidoso ya no es destructivo. extract_stored
      borra solo content/{revision} y hace rollback de su propia revisión parcial; el reemplazo se
      estaciona y valida antes de mover el puntero de BD y podar la revisión anterior. La revisión válida
      previa se preserva por diseño, no por suerte del fixture. El caso irrecuperable del editor queda
      cerrado.
    relacionados:
      - DEC-0055
      - DEC-0050
      - DEC-0054
      - DEC-0057
