    ruta: decisiones/adr/DEC-0051-eventos-ciclo-de-vida-intento.md
    fecha: 2026-06-12
    relacionados: [DEC-0041, DEC-0007, DEC-0040, DEC-0044]
    notas: >-
      Extiende DEC-0041 (no la supersede): añade 2 eventos de ciclo de vida del alumno,
