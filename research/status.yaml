      (view/report/grade/mod_form/editor/external/privacy/migration) no cambian. exelearning_supports()
      intacto (lo edita otro carril). Paridad cubierta por la suite existente sin tocar asserts;
      3 unit tests nuevos (grade_item_manager, scorm_injector, package_manager). phpcs 0/0.
      Riesgo RIE-018 (regresión de cálculo de notas) mitigado por movimiento verbatim + suite +
      Codecov patch ≥80% (DEC-0048) + CI.
  DEC-0051:
    titulo: "Eventos de ciclo de vida del intento (attempt_started / attempt_completed), uno por intento"
