# Matriz comparativa de estándares de tracking candidatos para mod_exelearning.
# Estado: CERRADA. DEC-0003 acepta SCORM 1.2 como tracking vigente suficiente,
# servido por shim propio sobre el ELPX nativo; xAPI queda como hoja de ruta en
# DEC-0014.

titulo: "Estándar de tracking + multi-grade-items"
fecha: 2026-05-28
decision_relacionada: DEC-0003
estado: cerrada

# Escala cuantitativa 0-5:
# 0 = nulo/incompatible, 1 = muy bajo, 2 = bajo, 3 = aceptable,
# 4 = bueno, 5 = excelente. Total = puntuacion * peso.
criterios:
  multi_grade_items:
    peso: 5
    justificacion: "Requisito funcional duro de mod_exelearning."
  preservacion_sidebar_nativa:
    peso: 5
    justificacion: "Requisito funcional duro: la sidebar de eXeLearning debe conservarse."
  granularidad_score:
    peso: 4
    justificacion: "Cuánto detalle queda registrado por interacción."
  soporte_moodle_nativo:
    peso: 4
    justificacion: "Reduce código del plugin y aprovecha el subsistema oficial."
  adopcion_en_exelearning_actual:
    peso: 4
    justificacion: "Si eXeLearning ya emite el formato, evita cambios aguas arriba."
  complejidad_implementacion:
    peso: 3
    justificacion: "Coste de desarrollo y mantenimiento del plugin."
  futuro_vs_legacy:
    peso: 2
    justificacion: "Estabilidad a 5 años."

opciones:
  scorm_1_2:
    elegible_como_tracking_vigente: true
    multi_grade_items: 3
    preservacion_sidebar_nativa: 5
    granularidad_score: 3
    soporte_moodle_nativo: 5
    adopcion_en_exelearning_actual: 5
    complejidad_implementacion: 4
    futuro_vs_legacy: 1
    total_ponderado: 92
    notas: >-
      Elegido como camino vigente: eXeLearning ya emite SCORM 1.2 y el plugin
      conserva la sidebar sirviendo el ELPX nativo; la multicalificación se
      resuelve en Moodle con content.xml + multi-itemnumber, no con el CMI puro.
  scorm_2004:
    elegible_como_tracking_vigente: true
    multi_grade_items: 3
    preservacion_sidebar_nativa: 4
    granularidad_score: 4
    soporte_moodle_nativo: 4
    adopcion_en_exelearning_actual: 3
    complejidad_implementacion: 3
    futuro_vs_legacy: 2
    total_ponderado: 84
    notas: >-
      Camino intermedio por objectives, pero exige convención adicional y no
      aporta ventaja suficiente frente al puente SCORM 1.2 ya verificado.
  xapi:
    elegible_como_tracking_vigente: false
    bloqueo: "eXeLearning no emite xAPI hoy; requiere soporte upstream o puente futuro (DEC-0014)."
    multi_grade_items: 5
    preservacion_sidebar_nativa: 5
    granularidad_score: 5
    soporte_moodle_nativo: 5
    adopcion_en_exelearning_actual: 0
    complejidad_implementacion: 2
    futuro_vs_legacy: 5
    total_ponderado: 106
    notas: >-
      Mejor encaje teórico y futura hoja de ruta (DEC-0014), pero no es el
      tracking vigente porque eXeLearning no emite xAPI hoy.
  cmi5:
    elegible_como_tracking_vigente: false
    bloqueo: "eXeLearning no emite cmi5 hoy y el plugin necesitaría un launch model nuevo."
    multi_grade_items: 5
    preservacion_sidebar_nativa: 3
    granularidad_score: 4
    soporte_moodle_nativo: 3
    adopcion_en_exelearning_actual: 0
    complejidad_implementacion: 1
    futuro_vs_legacy: 5
    total_ponderado: 81
    notas: >-
      Buen modelo conceptual, pero sin adopción actual en eXeLearning y con coste
      extra de launch model + parsing cmi5.xml.
  lti_1_3_ags:
    elegible_como_tracking_vigente: false
    bloqueo: "Modelo de herramienta externa; no satisface el caso subir paquete .elpx a Moodle."
    multi_grade_items: 5
    preservacion_sidebar_nativa: 0
    granularidad_score: 5
    soporte_moodle_nativo: 5
    adopcion_en_exelearning_actual: 0
    complejidad_implementacion: 0
    futuro_vs_legacy: 5
    total_ponderado: 75
    notas: >-
      Descartado para el caso de uso principal: subir y servir un paquete dentro
      de Moodle con sidebar nativa. Sólo tendría sentido para un servicio externo.

veredicto: >-
  DEC-0003 acepta SCORM 1.2 como tracking vigente suficiente entre las opciones
  elegibles hoy porque maximiza adopción real, preserva la sidebar nativa y
  mantiene complejidad asumible. xAPI puntúa mejor como arquitectura futura, pero
  no es elegible como tracking vigente mientras eXeLearning no emita statements;
  queda condicionado a soporte upstream y se documenta en DEC-0014.
