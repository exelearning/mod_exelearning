fecha: 2026-06-17
sesion: adr-validacion-canonica-endpoint-xapi-y-analisis-2.0
agente: claude-code
resumen: >-
  Segunda tanda de la jornada (continuación de la investigación ADL/xAPI, AN-014): el
  usuario pide (a) abrir el ADR que acepta las reglas de validación canónica del endpoint
  y (b) analizar el estado de xAPI 2.0 y si aplica. Se investiga xAPI 2.0 = IEEE
  9274.1.1-2023 (Active Standard, publicado 2023-10-06) verificando el texto normativo
  open source de IEEE-SA (Apache-2.0). Hallazgo decisivo: 2.0 NO obliga a mod_exelearning
  (no es un LRS); el modelo de Statement es retro-compatible (result.score idéntico; solo
  contextAgents/contextGroups nuevos y opcionales); HTTPS sigue sin ser MUST; y la cláusula
  'un LRS 2.0 rechaza header <2.0.0' vincula a un LRS, no a un consumidor same-origin. Como
  el emisor upstream envía 1.0.3, la política es consumir 1.0.3 pero validar la versión de
  forma permisiva (aceptar 1.0.x y 2.0.0, nunca rechazar por header). Se crea FTE-017 (xAPI
  2.0) y se abre DEC-0059 (Propuesta) que formaliza M1/M2/M3/M4/M5/M6 + la política de
  versión como diseño vinculante para PR2/TAREA-015, complementando DEC-0032 sin superseder.
acciones:
  - "FTE-017 (fuentes/tecnologia/FTE-017-xapi-2.0-ieee-9274.md): estado, gobernanza (ADL→IEEE LTSC/P9274.1.1 en 2019, primer estándar IEEE open source Apache-2.0), documentación de acceso libre (opensource.ieee.org/xapi, xapi.ieee-saopen.org), tabla de diferencias 2.0 vs 1.0.3 para un consumidor, conformancia (suite ADL >1400 tests; Veracity primer LRS 2.0) y aplicabilidad ([INTERPRETACION] no obliga; recomendación: consumir 1.0.3 con validación permisiva de versión)."
  - "DEC-0059 (decisiones/adr/DEC-0059-validacion-canonica-endpoint-xapi-y-version.md, estado Propuesta): acepta como diseño vinculante (PR2/TAREA-015) las reglas de validación canónica del endpoint submit_xapi_statement — (1) score.scaled∈[-1,1] y raw∈[min,max] o rechazo; scaled<0 fuera del dominio eXeLearning→rechazo; (2) scorepct=scaled*100 documentado (s/10, f/100); (3) lista blanca de verbos; (4) object.id→ideviceId→itemnumber de la instancia o rechazo; (5) validación sintáctica (null fuera de extensions, IRI); (6) ignorar actor/authority/stored/timestamp→$USER+stored=now; (7) idempotencia por statement.id (no re-aplicar; 409 si difiere) + highest-score-wins por (registration,ideviceId); (8) política de versión Opción C (1.0.x y 2.0.0, nunca rechazar por header); (9) descartes de alcance State/Profile/Signed/cmi5/LRS externo. Opciones: validación mínima/canónica/LRS-completa y versión fija-1.0.3/migrar-2.0/tolerante; elegidas canónica + tolerante."
  - "status.yaml: append DEC-0059 en decisiones_bloqueantes (tras DEC-0032), estado Propuesta, relacionados [DEC-0032,DEC-0014,DEC-0003,DEC-0017,DEC-0007,DEC-0029]. Sin reescribir entradas previas (append-only)."
  - "AN-014: añadido FTE-017 a fuentes y DEC-0059 a relacionados; sección 'Actualización 2026-06-17' con la M-versión y el reparto M1..M6 (a DEC-0059) vs M7/M8/M9 (seguimiento). La nota sigue siendo la síntesis canónica, ahora enlazada bidireccionalmente con el ADR."
  - "Investigación 2.0 verificada contra texto normativo IEEE (no resúmenes): X-Experience-API-Version 2.0.0; LRS 2.0 rechaza <2.0.0 (vincula a LRS); result.score sin cambios; contextAgents/contextGroups Optional nuevos; HTTPS no MUST; Signed Statements JWS igual; authority/authorization eliminada/relajada."
  - "ID: en este repo el DEC más alto referenciado es DEC-0058 (grep en todo el árbol); DEC-0059 libre (las memorias sobre DEC-0059+ de iframemode/embeds son de otra rama/clon no presente aquí). Numeración monotónica respetada."
  - "Licencias (Rule 12): xAPI 2.0/IEEE 9274.1.1 texto open source Apache-2.0 (compatible GPLv3); solo se reutilizan reglas (hechos no protegibles), sin incorporar código → riesgo nulo. Sin cambios en thirdpartylibs.xml."
