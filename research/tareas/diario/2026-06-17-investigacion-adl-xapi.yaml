fecha: 2026-06-17
sesion: investigacion-ecosistema-adl-xapi
agente: claude-code
resumen: >-
  Investigación de cuatro recursos externos del ecosistema ADL/xAPI solicitada por el
  usuario (adlnet/Moodle-mod_cmi5launch, adlnet/Moodle-PHP-Libs, adlnet/xAPI-Spec y
  xapijs.dev / @xapi/xapi) y su cruce con la especificación de tracking ya existente
  (DEC-0032 ingesta dual SCORM+xAPI, AN-012 mapeo, docs/xapi-integration-plan.md). La
  evidencia se verificó con WebFetch sobre los repos a un commit fijado (no resúmenes) y
  con una consulta Context7 a /adlnet/xapi-spec. Conclusión: ninguno de los recursos
  cambia la arquitectura ni aporta código de runtime, pero permiten (a) cerrar RIE-013
  con reglas de validación canónicas citables, (b) precisar el mapeo scaled→scorepct (el
  emisor PR#1867 usa scaled=s/10 por iDevice y f/100 por paquete, no un [0,1] uniforme),
  (c) blindar idempotencia y descartes de alcance con normativa, y (d) revelar un hueco de
  diseño: como mod_exelearning no tiene player (a diferencia de cmi5launch, que delega el
  estado al CATAPULT player), passed/failed debe decidirse server-side. Se crean 5 fichas
  (2 REPO, 2 FTE, 1 AN) siguiendo la metodología; las mejoras quedan como recomendaciones
  en AN-014 (un AN no decide), sin tocar el plan/ADR ni código de plugin.
acciones:
  - "REPO-008 (fuentes/repositorios/REPO-008-moodle-mod-cmi5launch.md): módulo Moodle de referencia de ADL para ingesta xAPI/cmi5→gradebook. Documenta el patrón statement→nota (highest score wins por sesión, agregación highest/average en 2 niveles), registration como ancla de intento, backup del tracking, y el CONTRASTE de modelo: el estado passed/failed/completed lo calcula un player externo (CATAPULT), no Moodle; itemnumber=0 único (vs multi-item del plugin); sin persistencia ni dedup por statement.id. Licencia: cabeceras GPLv3-or-later / LICENSE raíz Apache-2.0. Rol: reference. commit main @ 9c7d90da."
  - "REPO-009 (fuentes/repositorios/REPO-009-moodle-php-libs.md): ficha de DESCARTE. Es un vendor-bundle de Composer para compilar Moodle 5.2.0 (license:null, 404 en LICENSE, sin código xAPI); firebase/php-jwt y guzzle que contiene YA están en Moodle core. Viola 'no vendorar' (DEC-0002). Rol: ignore. commit main @ 908d7298."
  - "FTE-015 (fuentes/tecnologia/FTE-015-xapi-spec-canonica.md): ancla normativa xAPI 1.0.3. Reglas que el endpoint DEBE validar: score.scaled∈[-1,1], raw∈[min,max], idempotencia por statement.id (no modificar estado ante id repetido; 409 si difiere; 400 batch duplicado), authority/stored controlados por el LRS (respalda IGNORA actor→$USER), X-Experience-API-Version:1.0.3 obligatorio en HTTP (no en postMessage), validación sintáctica (rechazar null fuera de extensions). Descartes de alcance: State/Profile/Signed Statements. Context7 /adlnet/xapi-spec consultado 2026-06-17. commit master @ ca782a11."
  - "FTE-016 (fuentes/tecnologia/FTE-016-xapijs-cliente-js.md): @xapi/xapi v3.0.3 (MIT). Tipos TS del statement (Statement.ts/Result.ts/Verb.ts) como contrato del shape, XAPI.Verbs (IRIs canónicos), fixtures derivables para Vitest/PHPUnit. fetchAdapter desacoplado valida usar fetch nativo (no axios al bundle AMD). cmi5 en paquete aparte (@xapi/cmi5) → evidencia de cmi5 fuera de alcance. Rol: reference + test-fixtures, NO dependencia. commit develop @ 5e28e9bd."
  - "AN-014 (analisis/notas/AN-014-ecosistema-adl-xapi-mejoras-spec.md): síntesis. Responde las 2 preguntas del usuario: beneficios por recurso + 9 mejoras priorizadas M1..M9 (cada una con destino archivo/DEC + evidencia citada), decisiones de reuso/licencia, reconsideración de cmi5 (matizada: sigue fuera de alcance, pero passed/failed debe decidirse server-side), [HIPOTESIS] y [PENDIENTE]. Enlaza REPO-008/009, FTE-015/016, FTE-011, AN-012, DEC-0032/0003/0014/0015."
  - "Verificado el pipeline real del plugin (mapa para aterrizar recomendaciones): track::ingest (classes/local/track.php:59-291) como punto único triple-caller (web track.php + WS save_track + futuro xAPI); apply_item_scores (track.php:470-520) rutea por objectid (DEC-0017) e ignora objectids no registrados; recompute_overall_pct nunca confía el overall del cliente (DEC-0018); aggregate_values highest/average/first/last/lowest (attempts.php:324-342); plantilla external_api en classes/external/manage_embedded_editor.php + db/services.php."
  - "Decisión de alcance (confirmada con el usuario): crear las 5 fichas y dejar M1..M9 como recomendaciones en AN-014, SIN tocar docs/xapi-integration-plan.md, tracking-architecture.md ni abrir ADR, y sin tocar código de plugin (fase 0)."
  - "Licencias (Rule 12): cmi5launch GPLv3-or-later (cabeceras) / Apache-2.0 (LICENSE) compatible; xAPI-Spec Apache-2.0; xAPI.js MIT; Moodle-PHP-Libs sin licencia → descartado. Solo se reutilizan reglas/patrones (no se copia ni vendora código)."
