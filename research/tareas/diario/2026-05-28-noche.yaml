resumen: "Per-iDevice grade routing + modo preview validados end-to-end. Editor portado y build hecho; falta debug del bootstrap."

acciones:
  - "track.php: parsea cmi.suspend_data con regex `^(\\d+)\\. \"([^\"]*)\"; [^:]+: ([\\d.]+)%; [^:]+: ([\\d.]+)%\\.?$` y rutea per-iDevice por itemnumber. La indexación ideviceNumber=DOM index+1 (common.js:1154) coincide con nuestro itemnumber del registry (classes/local/package.php) → mapeo directo, no requiere objectid lookup."
  - "Modo preview (DEC-0006) validado: track.php?mode=preview responde {ok:true, mode:'preview'} sin tocar gradebook. has_capability('moodle/course:manageactivities') decide si el modo se acepta; alumno común cae a grading silenciosamente. Protección verificada incluso con switch role to Student."
  - "Editor embebido portado completo (DEC-0005): Makefile + .env.dist + 3 workflows GitHub Actions + editor/{index,save,static,styles}.php + classes/local/embedded_editor_installer + classes/external/manage_embedded_editor + manage_embedded_editor_upload.php + classes/exelearning_package_legacy.php + 6 amd/src/*.js + settings.php (versión minimal). Rename masivo sed + perl aplicado a 19 archivos. dist/static/ poblado (178 MB) reusando el build de /Users/ernesto/Downloads/git/exelearning."

