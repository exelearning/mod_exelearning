fecha: 2026-05-29
sesion: grademodel-report-blueprint-teachermode-saneamiento
agente: claude-code
resumen: >-
  Continuación de la sesión del 29: ajustes de producto confirmados por erseco
  (grademodel sin "both", default por iDevice), report que refleja el modo,
  arreglo completo del blueprint del Playground (4 bugs encadenados), cambio de
  semántica de teachermodevisible a paridad real con mod_exeweb, traducción de
  comentarios de código a inglés, y saneamiento de estados de ADRs/backlog.
  Todo en main con CI verde (18/18) y verificado end-to-end en el Playground.

acciones:
  - "DEC-0008 (rev.): ELIMINADO el modo grademodel 'both'. Selector ahora peritem|overall excluyentes, default peritem (decisión erseco). Quitada la constante EXELEARNING_GRADEMODEL_BOTH y exelearning_exclude_overall_from_total(). install.xml default 2->1 + upgrade 2026052900 (migra filas 2->1 + change_field_default). Tests grademodel_test reescritos; lib_test ajustado (asumía default both). grademethod default confirmado highest."
  - "report.php: refleja el grademodel (peritem oculta fila Overall; overall oculta per-iDevice). 'Delete attempt' movido a la primera fila visible de cada intento (antes solo en Overall) + fallback de deletabilidad para intentos sin filas del modo. Verificado con datos reales (31 intentos -> 31 botones)."
  - "Blueprint Playground arreglado (4 bugs encadenados): (1) runPhpCode es PHP CLI CRUDO sin Moodle (php.run) -> $CFG null -> bootstrap con require config.php (probando /www/moodle, cwd, /var/www/html); (2) SCORM/H5P apuntaban a filearea packagefile/itemid 1 -> corregido a package/0 (los módulos leen de ahí); (3) el insert directo del Playground deja scorm.reference='' -> scorm_parse no halla el zip -> 0 scoes -> array_keys(null) en scorm_get_toc; el runPhpCode repointa reference al fichero almacenado antes de parsear; (4) h5pactivity.timecreated es NOT NULL sin default y el insert directo no lo pone -> 'Error writing to database'; se pasa timecreated en el step. + runPhpCode de exelearning (extract+sync) para crear iDevices sin abrir la actividad."
  - "teachermodevisible: cambia de semántica. Ya NO controla el banner 'Try as a student' (preview/grading DEC-0006, ahora siempre visible para profes). Ahora hace lo de mod_exeweb: inyecta CSS (exelearning_require_teacher_mode_hider) para ocultar #teacher-mode-toggler-wrapper dentro del iframe del paquete. Default 0 (oculto). upgrade 2026052901 (migra filas a 0 + change_field_default). Verificado en navegador autenticado."
  - "i18n: traducidos ~90 comentarios de código de español a inglés (lib.php, view.php, track.php, mod_form.php, settings.php, package.php, gradeitems.php, db/upgrade.php, setup_demo.php, report.php). research/** y libs SCORM vendoradas se mantienen en español/intactas. phpcs --standard=moodle limpio."
  - "Cierre de ADRs confirmados por erseco: DEC-0003 Aceptada (SCORM 1.2 vigente y suficiente), DEC-0004 Aceptada (matriz 4.5/5.0/5.1), DEC-0014 Aceptada A+C (SCORM 1.2 + xAPI solo hoja de ruta, sin empuje upstream; analítica LRS no prioritaria)."
  - "Saneamiento de estado: DEC-0005 -> Superseded (reemplazada por DEC-0009; era la versión con editor Online). DEC-0011 -> Aceptada (participation_summary + report.php implementados y verificados). TAREA-003/004/006 -> Done. TAREA-005 parcial (DEC-0003 ya aceptada; solo queda la cuantificación 0-5 opcional). Índices regenerados con build_indexes.py."

hallazgos:
  - "moodle-playground runPhpCode = php.run('<?php '+code) en proceso PHP nuevo SIN bootstrap de Moodle (handleRunPhpCode en src/blueprint/steps/request.js). Hay que require config.php para tener $CFG/$DB/APIs. El crash temprano abortaba el blueprint (faltaban SCORM+H5P)."
  - "moodle-playground addModule = INSERT directo a BD (ADR 0003), no add_moduleinfo, así que se salta *_add_instance (scorm_parse, deploy H5P, sync grade items). Copia los campos no-estándar del step al registro. Su helper pone timemodified pero NO timecreated -> falla en tablas con timecreated NOT NULL sin default (h5pactivity). Bug de raíz upstream: src/blueprint/php/helpers.js debería setear $instance->timecreated = time()."
  - "scorm_parse necesita $scorm->reference = nombre del zip en filearea package/0. Verificado: reference='' -> 0 scoes; reference=<zip> -> 2 scoes."
  - "El paquete eXeLearning v4 renderiza un #teacher-mode-toggler-wrapper en el HTML; ocultarlo = inyectar <style> en el contentDocument del iframe (same-origin) desde la página padre, vía $PAGE->requires->js_init_code (igual que mod_exeweb)."

pendientes:
  - "TAREA-002 (Context7): rellenar fichas FTE-001..FTE-008 con documentación citable. Es el único research realmente pendiente (no bloquea)."
  - "TAREA-005 (opcional/doc): cuantificar a 0-5 la matriz de DEC-0003."
  - "Verificación e2e del flujo borrar-iDevice -> Save (lógica verificada por simulación)."
  - "Bump de actions/checkout@v4 a versión con Node 24 antes del 2026-06-02 (deprecation de Node 20 en GitHub Actions)."

