fecha: 2026-06-04
sesion: categoria-de-calificacion-y-visibilidad-notas-alumno
agente: claude-code
resumen: >-
  Dos peticiones de la experta en usabilidad del INTEF, implementadas en un mismo PR.
  (#1) Falta el selector "Categoría de calificación" en el formulario del recurso eXe:
  confirmado (mod_form usa standard_coursemodule_elements y no hay campo gradecat ni
  columna ni categoryid en grade_update). (#2) Profesor y alumno ven items distintos y el
  alumno percibe que sus notas no aparecen: causa raíz = en peritem el item overall
  itemnumber=0 se mantiene OCULTO para completionpassgrade (DEC-0010) y, al seguir
  agregando, Moodle vacía el total del alumno por el ajuste por defecto
  grade_report_user_showtotalsifcontainhidden=0 (HIDE_TOTAL_IF_CONTAINS_HIDDEN); además el
  profesor lo ve por moodle/grade:viewhidden. Decisiones del usuario: #1 categoría plana
  estándar; #2 arreglar la vista del alumno manteniendo peritem. Implementado y verificado
  en Moodle 5.0.7 (Docker).
acciones:
  - "Investigación grade API (Context7 /moodle/moodle + lectura de core, FTE-012): grade_update ignora categoryid (allowlist) → mover con grade_item::set_parent; exclusión de agregación sólo por-nota con grade_grade::set_excluded (robusta en todos los métodos); get_hiding_affected salta las excluidas → excluir el overall deja de vaciar el total; default del ajuste de totales = 0 (vaciar)."
  - "#1 gradecat: columna exelearning.gradecat (install.xml + db/upgrade.php stage 2026060401); selector en mod_form.php reutilizando strings core (gradecategoryonmodform) + grade_get_categories_menu; disabledIf gradeenabled; data_preprocessing precarga desde la categoría real del overall; helper exelearning_apply_grade_category (set_parent a todos los items) llamado al final de exelearning_sync_grade_items."
  - "#2 visibilidad: helper exelearning_exclude_overall_grade (peritem → set_excluded(true) sobre la nota overall) llamado desde track.php y exelearning_recalculate_user_grades; migración de notas overall existentes en el stage 2026060401. version.php intacto (centinela DEC-0030)."
  - "Tests PHPUnit tests/grades_test.php (categoría: coloca y mueve; exclusión: overall excluido y per-item no en peritem, overall NO excluido en modo overall)."
  - "Verificación en vivo (Docker, Moodle 5.0.7): upgrade real OK (stage 2026060401), y con la API del core OVERALL excluded=1 / PERITEM excluded=0 / COURSE TOTAL blanked_by_hidden=NO (fixed) / items bajo la categoría elegida. phpcs --standard=moodle limpio."
