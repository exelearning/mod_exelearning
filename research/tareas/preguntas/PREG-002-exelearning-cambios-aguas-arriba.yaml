id: PREG-002
pregunta: "¿Qué cambios aguas arriba en eXeLearning facilitarían el soporte multi-grade-items en Moodle?"
estado: resuelta
fecha_apertura: 2026-05-28
fecha_resolucion: 2026-05-29
# RESUELTA 2026-05-29: el cambio upstream de mayor valor (preservar odeIdeviceId
# al importar/re-exportar) YA ESTÁ HECHO. El PR exelearning/exelearning#1791
# ("fix(ids): unify and harden the four stable-identifier PRs", merged
# 2026-05-19) preserva odeIdeviceId/odePageId/odeBlockId verbatim al importar y
# sólo reasigna en colisión real; garantiza round-trip sin cambios = content.xml
# idéntico. Eso elimina RIE-006 (ver DEC-0012). No hace falta abrir issue: la
# propuesta que íbamos a hacer ya está implementada y mergeada upstream.
contexto: |
  Si la publicación actual no expone identificadores estables ni statements xAPI,
  conviene proponer cambios upstream para evitar parches frágiles en mod_exelearning.
hipotesis:
  - "Publicar un manifiesto adicional `exelearning-gradeitems.json` con `[{id, title, maxscore}]` por item calificable."
  - "Emitir statements xAPI 1.0.3 desde el paquete publicado (via postMessage o vía fetch a un endpoint configurable)."
  - "Añadir un perfil xAPI propio publicado por eXeLearning (`https://exelearning.net/xapi/profile/v1`) con definición de Activity Types y Verbs."
  - "En SCORM 2004 export, materializar cada iDevice calificable como un `<objective>` con `id` estable."
evidencias_necesarias:
  - "Resultado de EXP-001 (qué emite hoy el paquete)."
  - "Conversación con mantenedores de eXeLearning para confirmar disposición al cambio."
resolucion: ""
relacionados:
  - REPO-005
  - FTE-003
  - FTE-008
  - PREG-001
  - DEC-0003
