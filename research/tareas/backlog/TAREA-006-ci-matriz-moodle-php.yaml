notas: "Done (2026-05-29): .github/workflows/ci.yml con moodle-plugin-ci, matriz REAL de 18 jobs = Moodle 4.5 (PHP 8.1-8.3) + 5.0/5.1 (PHP 8.2-8.4) × pgsql/mariadb (no 4.1/4.3/main: ver DEC-0004; 5.2 como follow-up). Corre lint/phpmd/phpcs/phpdoc/validate/savepoints/mustache/grunt/phpunit/behat. Verde 18/18. PostgreSQL >=15 obligatorio en Moodle 5.1. + codeql + dependabot."
