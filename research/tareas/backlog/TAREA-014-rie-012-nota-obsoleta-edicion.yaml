id: TAREA-014
titulo: "RIE-012: observar falsos positivos del contenthash al editar contenido calificable"
estado: Pending
fecha: 2026-06-02
agente: pendiente
prioridad: baja
objetivo: >-
  Confirmar que el aviso de nota obsoleta (DEC-0021) no sea ruidoso en paquetes reales:
  el contenthash por iDevice no debe marcar "changed" cuando un re-export reescribe el
  bloque de content.xml sin cambio semántico (orden, espacios, metadatos volátiles).
pasos:
  - "Recoger ediciones reales del editor embebido y comparar contenthash antes/después."
  - "Si hay falsos positivos, afinar la región hasheada (excluir más metadatos volátiles o normalizar)."
  - "Reevaluar si conviene distinguir en el aviso entre alta/baja (cierto) y editado (best-effort)."
relacionados:
  - RIE-012
  - DEC-0021
  - DEC-0012
  - FTE-010
criterios_aceptacion:
  - "Editar las opciones de una tarea dispara el aviso; re-guardar sin cambios no lo dispara."
  - "El aviso sigue siendo informativo (no bloquea el guardado) y enlaza al informe de intentos."
notas: >-
  Riesgo bajo. El recálculo automático de notas NO es viable (eXeLearning puntúa en el
  cliente; el servidor solo guarda scaledscore). Mitigación vigente: snapshot + aviso +
  reset manual de intentos (report.php).
