# Codecov configuration for mod_exelearning.
# See https://docs.codecov.com/docs/codecovyml-reference
coverage:
  status:
    project:
      default:
        # Goal coverage. Kept informational so it reports progress toward 80%
        # without ever blocking a pull request.
        target: 80%
        threshold: 1%
        informational: true
    patch:
      default:
        informational: true

# Make the PR comment show the project coverage percentage and the diff.
comment:
  layout: "condensed_header, diff, flags, components, files"
  require_changes: false
  behavior: default
