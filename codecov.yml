# Codecov configuration for mod_exelearning.
# The project/patch status checks report the coverage percentage on every
# commit/PR (not informational, so the figure shows and the check passes/fails),
# like exelearning/exelearning. See https://docs.codecov.com/docs/codecovyml-reference
#
# The project gate uses `target: auto`: it locks coverage in at whatever level
# `main` currently reaches and FAILS any PR that drops below it (minus a small
# noise threshold) — a ratchet that can only go up. To enforce it as a merge
# requirement, add `codecov/project` to the required status checks in the GitHub
# branch-protection rule for `main` (Settings -> Branches).
#
# The PHP upload stays unflagged on purpose: in CI the plugin lives under
# mod/exelearning/, so a flag path filter like `classes/` matches nothing and yields
# "No coverage data available". The coverage scope is already limited in
# tests/coverage.php. moodle-plugin-ci installs the plugin under moodle/mod/exelearning/,
# so the coverage report paths are prefixed with that. Strip it so coverage maps onto
# the repository tree (classes/, lib.php) instead of phantom paths — otherwise Codecov
# shows 0 files / no percentage. (The `javascript` flag added below is unaffected: the
# jsunit job checks out at the repo root, so its js/ paths need no fix.)
fixes:
  - "moodle/mod/exelearning/::"

coverage:
  status:
    project:
      default:
        # Lock in the level main reaches; fail PRs that regress beyond the noise
        # threshold. This is the "requirement at whatever level we achieve" gate.
        target: auto
        threshold: 0.5%
    patch:
      default:
        # New/changed lines in a PR must be at least 80% covered.
        target: 80%

# The Vitest coverage of the grade-critical SCORM tracker (js/scorm_tracker.js) is
# uploaded by the jsunit job under this flag, so it is tracked apart from the PHP figure.
flags:
  javascript:
    paths:
      - js/
    carryforward: true

# Surface JS coverage as its own component in the PR comment and gate its patch lines,
# mirroring the PHP project/patch gates above.
component_management:
  individual_components:
    - component_id: javascript
      name: JavaScript (SCORM tracker)
      flag_regexes:
        - javascript
      statuses:
        - type: project
          target: auto
          threshold: 0.5%
        - type: patch
          target: 80%

# Show the coverage percentage and the diff in the PR comment.
comment:
  layout: "condensed_header, diff, components, files"
  require_changes: false
