# Codecov configuration for mod_exelearning.
# The project/patch status checks report the coverage percentage against an 80%
# target (not informational, so the figure shows on every commit/PR), like
# exelearning/exelearning. See https://docs.codecov.com/docs/codecovyml-reference
#
# No `flags` here on purpose: in CI the plugin lives under mod/exelearning/, so a
# flag path filter like `classes/` matches nothing and yields "No coverage data
# available". The coverage scope is already limited in tests/coverage.php.
coverage:
  status:
    project:
      default:
        target: 80%
    patch:
      default:
        target: 80%

# Show the coverage percentage and the diff in the PR comment.
comment:
  layout: "condensed_header, diff, components, files"
  require_changes: false
