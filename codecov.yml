# Codecov configuration for mod_exelearning.
# Mirrors the exelearning/exelearning setup: the project/patch status checks
# report the coverage percentage against an 80% target (not informational, so
# the figure is shown on every commit/PR). See
# https://docs.codecov.com/docs/codecovyml-reference
coverage:
  status:
    project:
      default:
        target: 80%
    patch:
      default:
        target: 80%

flags:
  unittests:
    paths:
      - classes/
      - lib.php

# Show the coverage percentage and the diff in the PR comment.
comment:
  layout: "condensed_header, diff, flags, components, files"
  require_changes: false
