# Codecov configuration for mod_exelearning.
# Coverage is reported, not gated: status checks are informational so they
# never block a pull request. See https://docs.codecov.com/docs/codecovyml-reference
coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

comment:
  layout: "reach, diff, flags, files"
  require_changes: false
