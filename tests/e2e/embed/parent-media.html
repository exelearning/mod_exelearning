<!doctype html>
<!--
  E2E harness — the "parent" half for the interactive-video media bridge (DEC-0067).
  The trusted host page. Embeds the content in an opaque-origin sandboxed iframe and runs
  mod's own parent-side media host (exe_media_policy.js + exe_media_host.js), exactly like
  view.php wires it in secure mode. The host completes the capability handshake and opens
  the provider player in a modal, driven by RAW postMessage (no third-party SDK).
-->
<html><head><meta charset="utf-8">
<style>#wrap{position:relative;width:560px;height:420px}#content{width:100%;height:100%;border:0}</style>
</head><body>
<div id="wrap">
    <iframe id="content" sandbox="allow-scripts" src="content-media.html"></iframe>
</div>
<script src="/tests/e2e/embed/exe_media_policy.js"></script>
<script src="/tests/e2e/embed/exe_media_host.js"></script>
<script>window.exeMediaHost.attach(document.getElementById('content'), {});</script>
</body></html>
