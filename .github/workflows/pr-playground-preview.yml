---
name: PR Playground Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: playground-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  playground-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      # No checkout or blueprint rewrite needed. The playground fetches the
      # branch's own blueprint.json through the github-proxy (a short
      # ?blueprint-url= link instead of a giant base64 ?blueprint=, which
      # overflowed the URL limit → HTTP 414). The proxy serves the raw file
      # with CORS, and the playground derives {{REPO}}/{{REF}} from the proxy
      # URL so the plugin (and fixtures) install from this PR's branch.
      - uses: ateeducacion/action-moodle-playground-pr-preview@main
        with:
          blueprint-url: "https://github-proxy.exelearning.dev/?repo=${{ github.event.pull_request.head.repo.full_name }}&branch=${{ github.event.pull_request.head.ref }}&path=blueprint.json"
          mode: append-to-description
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-text: >
            ℹ️ The eXeLearning editor is fetched from the shared release and
            unpacked into the plugin when the playground boots, so the first
            load may take a few extra seconds. ELPX upload, viewer and preview
            work normally.
