name: Moodle Plugin CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs to save resources: a new push aborts the previous
# in-progress run of the same group. The group separates each PR (by number)
# from branch pushes (by ref), so a main/master push only cancels other
# main/master runs, never a PR's runs (and vice versa).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_USER: 'root'
          MYSQL_ALLOW_EMPTY_PASSWORD: "true"
          MYSQL_CHARACTER_SET_SERVER: "utf8mb4"
          MYSQL_COLLATION_SERVER: "utf8mb4_unicode_ci"
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 4.5 LTS (MOODLE_405_STABLE) -> PHP 8.1, 8.2, 8.3
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.1'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.1'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.2'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.2'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.3'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_405_STABLE'
            php: '8.3'
            database: 'mariadb'
          # Moodle 5.0 (MOODLE_500_STABLE) -> PHP 8.2, 8.3, 8.4
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.2'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.2'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.3'
            database: 'pgsql'
            # Single combination that also generates code coverage and uploads it
            # to Codecov. Uses xdebug rather than pcov: pcov systematically fails
            # to credit some executed lines (e.g. lib.php's package extraction and
            # SCORM injection), understating coverage; xdebug reports them.
            coverage: 'xdebug'
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.3'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.4'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_500_STABLE'
            php: '8.4'
            database: 'mariadb'
          # Moodle 5.1 (MOODLE_501_STABLE) -> PHP 8.2, 8.3, 8.4
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.2'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.2'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.3'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.3'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.4'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_501_STABLE'
            php: '8.4'
            database: 'mariadb'
          # Moodle 5.2 (MOODLE_502_STABLE) -> PHP 8.3, 8.4
          # Moodle 5.2 raises the PostgreSQL minimum to 16.
          - moodle-branch: 'MOODLE_502_STABLE'
            php: '8.3'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_502_STABLE'
            php: '8.3'
            database: 'mariadb'
          - moodle-branch: 'MOODLE_502_STABLE'
            php: '8.4'
            database: 'pgsql'
          - moodle-branch: 'MOODLE_502_STABLE'
            php: '8.4'
            database: 'mariadb'

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          path: plugin

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ${{ matrix.extensions }}
          ini-values: max_input_vars=5000
          # Enable a coverage driver only on the designated coverage job.
          coverage: ${{ matrix.coverage || 'none' }}

      - name: Initialise moodle-plugin-ci
        run: |
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install moodle-plugin-ci
        run: moodle-plugin-ci install --plugin ./plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: Configure Behat timeout
        run: moodle-plugin-ci add-config -- '$CFG->behat_increasetimeout = 3;'

      - name: PHP Lint
        if: ${{ always() }}
        run: moodle-plugin-ci phplint

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ always() }}
        run: moodle-plugin-ci phpmd

      - name: Moodle Code Checker
        if: ${{ always() }}
        run: moodle-plugin-ci phpcs --max-warnings 0

      - name: Moodle PHPDoc Checker
        if: ${{ always() }}
        run: moodle-plugin-ci phpdoc --max-warnings 0

      - name: Validating
        if: ${{ always() }}
        run: moodle-plugin-ci validate

      - name: Check upgrade savepoints
        if: ${{ always() }}
        run: moodle-plugin-ci savepoints

      - name: Mustache Lint
        if: ${{ always() }}
        run: moodle-plugin-ci mustache

      - name: Grunt
        if: ${{ always() }}
        # The embedded editor AMD modules are ported from exelearning/mod_exeweb
        # and carry upstream eslint *warnings* (promise/always-return, no-nesting,
        # no-alert, complexity). They are not errors and don't block the build, so
        # we don't enforce --max-lint-warnings 0 here (mirrors upstream practice).
        run: moodle-plugin-ci grunt

      - name: PHPUnit tests
        if: ${{ always() }}
        # On the coverage job, also emit a Clover report (written to
        # ./coverage.xml in the workspace root by moodle-plugin-ci).
        run: moodle-plugin-ci phpunit --fail-on-warning ${{ matrix.coverage && '--coverage-text --coverage-clover' || '' }}

      - name: Upload coverage to Codecov
        # Only the coverage job produces ./coverage.xml. A failed/missing upload
        # must never break CI, so fail_ci_if_error stays false. Requires the
        # CODECOV_TOKEN repository secret.
        if: ${{ matrix.coverage && !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ateeducacion/mod_exelearning
          files: ./coverage.xml
          # Flag the PHP report so it is tracked as its own flag/component
          # (the JS job uploads under `javascript`); without a flag PHP would be
          # absent from the Flags/Components breakdown and the PR comment.
          flags: php
          # Upload only our report; do not scan the Moodle tree (it contains
          # deliberately malformed XML fixtures that break Codecov processing).
          disable_search: true
          fail_ci_if_error: false

      - name: Generate JUnit report for Codecov Test Analytics
        # moodle-plugin-ci phpunit cannot emit JUnit, so run phpunit directly
        # against the installed Moodle tree to produce a report. The pass/fail
        # gate stays the moodle-plugin-ci step above; '|| true' just guarantees a
        # report is written even when a test fails (Test Analytics needs it).
        if: ${{ matrix.coverage && !cancelled() }}
        working-directory: moodle
        run: php vendor/bin/phpunit --testsuite mod_exelearning_testsuite --log-junit "$GITHUB_WORKSPACE/junit.xml" || true

      - name: Upload test results to Codecov
        if: ${{ matrix.coverage && !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          flags: php
          # Only parse our JUnit file; the Moodle tree ships malformed XML
          # fixtures that otherwise fail Test Analytics processing.
          disable_search: true

      - name: Behat features
        id: behat
        if: ${{ always() }}
        run: moodle-plugin-ci behat --profile chrome

      - name: Mark cancelled jobs as failed
        if: ${{ cancelled() }}
        run: exit 1

  # JavaScript unit tests for the grade-critical SCORM tracker (js/scorm_tracker.js),
  # run with Vitest. Kept as a separate Node-only job on purpose: it does not depend on
  # PHP, a database or a Moodle install, so it must not be multiplied across the PHP
  # matrix. Coverage and test results upload to Codecov under the `javascript` flag so
  # they are tracked apart from the PHP figure.
  jsunit:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: JS unit tests with coverage
        run: npx vitest run --coverage --reporter=default --reporter=junit --outputFile=junit-js.xml

      - name: Upload JS coverage to Codecov
        # A failed/missing upload must never break CI. Requires the CODECOV_TOKEN secret.
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ateeducacion/mod_exelearning
          files: ./coverage/lcov.info
          flags: javascript
          disable_search: true
          fail_ci_if_error: false

      - name: Upload JS test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-js.xml
          flags: javascript
          disable_search: true

  # Static guard for the Release workflow (DEC-0058): assert that a published
  # release builds the embedded editor from the matching editor TAG, never from
  # the moving `main` branch, so two builds of the same plugin tag always bundle
  # the same editor. Fast, no matrix, no PHP/DB/Moodle dependency.
  release-workflow-check:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Validate release workflow editor pinning
        run: bash scripts/check-release-workflow.sh
